<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ARMEEBOX</title>
    <link rel="icon" type="image/png" href="/logo.png" />
    <meta name="description" content="ARMEEBOX – im Aufbau" />
    <style>
      :root{--bg:#07111f;--panel:#0e1a2d;--line:#223454;--text:#eef3ff;--muted:#aeb9d3;--accent:#b7c98b}
      *{box-sizing:border-box} body{margin:0;font-family:Arial,Helvetica,sans-serif;background:radial-gradient(circle at top,#0d1c38 0%,#06101f 55%,#030812 100%);color:var(--text);min-height:100vh;display:grid;place-items:center;padding:24px}
      .card{width:min(760px,100%);background:linear-gradient(180deg,rgba(14,26,45,.95),rgba(10,19,34,.96));border:1px solid var(--line);border-radius:28px;padding:38px 26px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.35)}
      img{width:min(360px,78vw);height:auto;display:block;margin:0 auto 24px}
      .kicker{letter-spacing:3px;text-transform:uppercase;color:#d8b339;font-size:12px;margin-bottom:14px}
      h1{margin:0 0 14px;font-size:clamp(28px,5vw,48px)}
      p{margin:0 auto 10px;max-width:560px;color:var(--muted);font-size:clamp(16px,2vw,20px);line-height:1.55}
      .note{margin-top:22px;color:var(--accent);font-size:14px}
    </style>
  </head>
  <body>
    <main class="card">
      <div class="kicker">ARMEEBOX.CH</div>
      <img src="/logo.png" alt="ARMEEBOX" />
      <h1>Under Construction</h1>
      <p>Unsere neue Plattform befindet sich aktuell im Aufbau.</p>
      <p>Die finale Version wird nach Abschluss der Arbeiten veröffentlicht.</p>
      <div class="note">Zugriff aktuell nicht öffentlich freigegeben.</div>
    </main>
  </body>
</html>
